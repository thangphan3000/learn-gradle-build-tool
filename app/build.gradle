 * This generated file contains a sample Java application project to get you started.
 * For more details on building Java & JVM projects, please refer to https://docs.gradle.org/9.5.0/userguide/building_java_projects.html in the Gradle documentation.
 */

plugins {
    // Apply the application plugin to add support for building a CLI/console application in Java.
    id 'application'
    id 'org.barfuin.gradle.taskinfo' version '3.0.2'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Use JUnit Jupiter for testing.
    testImplementation libs.junit.jupiter

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // This dependency is used by the application.
    implementation libs.guava
    // NOTE: implementation = dependency is available to app internally (compile + runtime for app), but not exposed to consumers of app as public API.
    implementation project(':util')
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

// configuration get from application plugin
application {
    // Define the main class for the application.
    // NOTE: `com.bank` is package name
    mainClass = 'com.bank.App'
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}

// NOTE: compile options (like debug) are task inputs and affect up-to-date checks.
tasks.named('compileJava') {
    options.debug = true
}
