plugins {
    // Uses the `java-library` plugin, so this module provides a JAR and has no `run` task.
    id 'java-library'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation libs.junit.jupiter
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // Utils uses Pair internally but exposes only Java types, so consumers do not need Commons Lang to compile.
    implementation 'org.apache.commons:commons-lang3:3.18.0'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

tasks.named('test') {
    useJUnitPlatform()
}
